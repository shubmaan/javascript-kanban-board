<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <main>
        <nav id="navBar">
            <div class="leftNavDiv">
                Kanban Board
            </div>
            <div class="rightNavDiv"><button id="addNewTaskBtn" class="btn">ADD NEW TASK</button></div>
        </nav>
        <section class="hero">
            <div class="colums to-do">
                <div class="heading">
                    <div class="left">To-Do</div>
                    <div class="right">Count</div>
                </div>
            </div>
            <div class="colums in-progress">
                <div class="heading">
                    <div class="left">In-Progress</div>
                    <div class="right">Count</div>
                </div>
            </div>
            <div class="colums done">
                <div class="heading">
                    <div class="left">Done</div>
                    <div class="right">Count</div>
                </div>
            </div>
        </section>
        
    </main>
    



    <script src="script.js"></script>
</body>
</html>
