<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kanban Board</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main>
            <nav id="navBar">
                <div class="leftNavDiv">Kanban Board</div>
                <div class="rightNavDiv">
                    <button id="addNewTaskBtn" class="btn">ADD NEW TASK</button>
                </div>
            </nav>
            <section class="hero">
                <div class="columns to-do">
                    <div class="heading">
                        <div class="left">To-Do</div>
                        <div class="right" id="allTask-toDo-count">0</div>
                    </div>
                    <div class="allTask allTask-toDo"></div>
                </div>
                <div class="columns in-progress">
                    <div class="heading">
                        <div class="left">In-Progress</div>
                        <div class="right" id="allTask-InProgress-count">0</div>
                    </div>
                    <div class="allTask allTask-InProgress"></div>
                </div>
                <div class="columns done">
                    <div class="heading">
                        <div class="left">Done</div>
                        <div class="right" id="allTask-done-count">0</div>
                    </div>
                    <div class="allTask allTask-done"></div>
                </div>
            </section>
            <section class="addNewTaskPage">
                
                <div class="addNewTask">
                    <div id="addNewTaskTop">
                        <h2>ADD NEW TASK</h2>
                    </div>
                    <div id="inputArea">
                        <input type="text" class="taskTitle inputBar" placeholder="Task Title">
                        <input placeholder="Task Discraption" class="TaskDiscraption inputBar"></input>
                    </div>

                    <div id="addNewTaskPageBtns">
                        <button class="btn addNewTaskPageBtn" id="addNewTaskOkBtn">Ok</button>
                        <button class="btn addNewTaskPageBtn" id="addNewTaskCancelBtn">Cancel</button>
                    </div>
                </div>
                    
                    
                    
            </section>
        </main>

        <script src="script.js"></script>
    </body>
</html>
